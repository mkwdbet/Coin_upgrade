<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>암호화폐 강화하기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="top-bar">
        <span></span>
        <h1>코인 강화하기</h1>
        <button class="nav-button" type="button" id="shopButton">상점가기</button>
      </header>

      <section class="playfield" aria-live="polite">
        <div class="market-panel">
          <p>강화비용:<strong id="upgradeCost">$0</strong></p>
        </div>

        <div class="coin-stage">
          <div class="coin-aura" id="coinAura">
            <img id="coinImage" src="" alt="" />
          </div>
          <div class="coin-copy">
            <h2 id="coinName">불러오는 중</h2>
            <p id="coinSymbol"></p>
          </div>
        </div>

        <div class="status-row">
          <div>
            <span>성공률</span>
            <strong id="successRate">100%</strong>
          </div>
          <div>
            <span>판매가격</span>
            <strong id="marketPrice">$0</strong>
          </div>
        </div>

        <div class="actions">
          <button class="primary-action" type="button" id="upgradeButton">강화하기</button>
          <button class="secondary-action" type="button" id="sellButton">판매하기</button>
        </div>

        <div class="bottom-panel">
          <p>돈:<strong id="money">$100</strong></p>
        </div>
      </section>

      <aside class="rank-board">
        <div class="rank-title">
          <h2>시가총액 상위 30개 코인</h2>
          <span id="dataStatus">시세 불러오는 중</span>
        </div>
        <ol id="rankList"></ol>
      </aside>

      <div class="fail-overlay" id="failOverlay" aria-hidden="true">
        <div class="fail-card">
          <img
            src="elon.jpg"
            alt="실패를 놀리는 일론 머스크 사진"
          />
          <p id="failTaunt">강화가 로켓처럼 터졌습니다.</p>
          <button type="button" id="failCloseButton">다시 도전</button>
        </div>
      </div>

      <div class="toast" id="toast" role="status"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
